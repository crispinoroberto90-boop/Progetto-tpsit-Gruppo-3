<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Cliente - Ordina Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <h1>🍹 BAR CLIENTE</h1>
                    <p>Ordina solo ciò che il manager ha inserito nel menu</p>
                </div>
                <div class="header-stats">
                    <div class="stat">
                        <span class="stat-label">Prodotti Disponibili</span>
                        <span class="stat-value" id="menuCount">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Totale Carrello</span>
                        <span class="stat-value" id="cartTotal">€0.00</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="section-title">
                <h2>📋 Menu del Bar</h2>
                <p class="section-description">Scegli tra i prodotti inseriti dal manager e crea il tuo ordine.</p>
            </section>

            <div class="menu-grid" id="menuGrid"></div>

            <section class="section-title" style="margin-top: 40px;">
                <h2>🛒 Carrello</h2>
                <div class="form-group" style="margin-top: 10px; max-width: 360px;">
                    <label>Tipo Ordine:</label>
                    <select id="orderTypeSelect">
                        <option value="banco">Banco</option>
                        <option value="tavolo">Tavolo</option>
                    </select>
                </div>
                <div class="form-group" style="max-width: 360px;">
                    <label>Numero Tavolo (se tavolo):</label>
                    <input type="number" id="tableNumber" min="1" placeholder="Es. 5">
                </div>
            </section>

            <div class="form-container" style="padding: 20px 25px;">
                <div id="cartItems" class="carrello-items"></div>
                <div class="carrello-totale">
                    <span>Totale Ordine:</span>
                    <span id="cartTotalValue" class="totale-value">€0.00</span>
                </div>
                <div class="form-actions" style="margin-top: 20px; justify-content: flex-end;">
                    <button class="btn-secondary" onclick="clearCart()">Svuota Carrello</button>
                    <button class="btn-primary" onclick="placeOrder()">Invia Ordine</button>
                </div>
            </div>
        </main>
    </div>

    <script src="user.js"></script>
</body>
</html>
